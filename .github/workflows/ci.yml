name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate import/compile
        run: |
          python -m py_compile main.py scheduler.py config.py
          python -m py_compile bot/telegram_bot.py database/db.py
          python -m py_compile scraper/banks.py scraper/chocale.py scraper/picodi.py
          python -m py_compile dashboard/dashboard.py
